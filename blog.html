---
layout: default
title: "Blog"
permalink: /blog/
---

<h2>Blog</h2>

<ul>
    {% assign category_name = "blog" %}
    {% for post in site.posts %}
        {% if post.categories contains category_name and post.draft != true %}
            <li><a href="{{ post.url }}">{{ post.title }}</a></li>
        {% endif %}
    {% endfor %}
</ul>
