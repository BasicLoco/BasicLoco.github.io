---
layout: default
title: "Traductions"
permalink: /traductions/
---

<h2>Traductions</h2>

<ul>
    {% assign category_name = "traductions" %}
    {% for post in site.posts %}
        {% if post.categories contains category_name and post.draft != true %}
            <li><a href="{{ post.url }}">{{ post.title }}</a></li>
        {% endif %}
    {% endfor %}
</ul>
